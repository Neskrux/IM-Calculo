# Reconciliacao diaria de pagamentos_prosoluto contra Sienge income.
#
# Roda toda manha 08h BRT (11h UTC). Pode ser disparado manualmente.
#
# O que faz (em ordem):
#   0. Sincroniza sales-contracts + receivable-bills do Sienge (traz vendas novas)
#      via edge function sienge-sync (auth: service_role bypass em auth.ts).
#   1. Corrige drift de data_prevista (gerar-plano + aplicar-correcao-data-prevista).
#   2. Reconciliacao GERAL contra Sienge (reconciliar-todas-vendas.mjs --apply):
#      - popula sienge_installment_id (ancoragem 1:1)
#      - marca pago parcelas que o Sienge confirma como pagas
#      - reativa canceladas que sao validas no Sienge
#      - cria parcelas faltantes
#      Com 5 salvaguardas: pula venda se houver qualquer ambiguidade.
#   3. Salva reports em artifact.
#   4. Falha o job se houver erros (dispara email).
#
# Idempotente: rodar 2x no mesmo dia = 0 updates no segundo run.
#
# Pre-requisitos (Secrets do repo):
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY (ou SUPABASE_SERVICE_ROLE_KEY)
#   SIENGE_USERNAME, SIENGE_PASSWORD, SIENGE_SUBDOMAIN

name: Reconciliacao Pagamentos

on:
  schedule:
    - cron: '0 11 * * *' # 08:00 BRT
  workflow_dispatch: # disparo manual via aba Actions

jobs:
  reconciliar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      # Etapa 0 — sincroniza sales-contracts + receivable-bills do Sienge
      # via edge function (autentica com service_role; bypass em auth.ts).
      # Fecha o ciclo: sem isso, vendas novas precisavam do botao manual.
      - name: Sincronizar vendas Sienge
        run: node scripts/sincronizar-vendas-sienge.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Gerar plano de correcao
        run: node scripts/gerar-plano-correcao-data-prevista.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SIENGE_USERNAME: ${{ secrets.SIENGE_USERNAME }}
          SIENGE_PASSWORD: ${{ secrets.SIENGE_PASSWORD }}
          SIENGE_SUBDOMAIN: ${{ secrets.SIENGE_SUBDOMAIN }}

      - name: Aplicar plano
        run: node scripts/aplicar-correcao-data-prevista.mjs --apply
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # Reconciliacao geral — todas as 298 vendas contra income Sienge.
      # Aplicado em massa pela primeira vez em 2026-05-14 (256 vendas, ~15k
      # operacoes). A partir daqui, o cron diario pega so o incremental
      # (parcelas pagas novas, divergencias que surgirem).
      - name: Reconciliar todas as vendas
        run: node scripts/reconciliar-todas-vendas.mjs --apply
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SIENGE_USERNAME: ${{ secrets.SIENGE_USERNAME }}
          SIENGE_PASSWORD: ${{ secrets.SIENGE_PASSWORD }}
          SIENGE_SUBDOMAIN: ${{ secrets.SIENGE_SUBDOMAIN }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reconciliation-report-${{ github.run_id }}
          path: |
            docs/plano-correcao-data-prevista-*.json
            docs/aplicacao-data-prevista-*.json
            docs/reconciliacao-geral-*.json
          retention-days: 30

      # Falha ruidosa: se houver erros em qualquer report, marca o job como
      # failed pra disparar email do GitHub Actions.
      - name: Verificar erros
        run: |
          set -e
          fail=0
          # data_prevista
          R=$(ls -t docs/aplicacao-data-prevista-*.json 2>/dev/null | head -1)
          if [ -n "$R" ]; then
            E=$(jq '.counts.errors' "$R"); U=$(jq '.counts.updated' "$R")
            echo "data_prevista: updated=$U errors=$E ($R)"
            [ "$E" -gt 0 ] && fail=1
          fi
          # reconciliacao geral
          R=$(ls -t docs/reconciliacao-geral-*-aplicado.json 2>/dev/null | head -1)
          if [ -n "$R" ]; then
            E=$(jq '.aplicacao.err // 0' "$R")
            P=$(jq '.aplicacao.okPop // 0' "$R")
            M=$(jq '.aplicacao.okMarc // 0' "$R")
            Rt=$(jq '.aplicacao.okReat // 0' "$R")
            C=$(jq '.aplicacao.okCriar // 0' "$R")
            RH=$(jq '.revisao_humana | length' "$R")
            echo "reconciliacao geral: populados=$P marcados=$M reativados=$Rt criados=$C revisao_humana=$RH errors=$E"
            [ "$E" -gt 0 ] && fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            echo "::error::Reconciliacao reportou erros — veja o artifact"
            exit 1
          fi
