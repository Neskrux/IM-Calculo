# Continuous Integration: roda em todo push e PR.
# Faz lint + build + testes. Se algo quebrar, falha visivel antes de merge.
#
# Sem secrets nem segredos — pura validacao de codigo.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true # nao falha se houver warnings ja existentes — so reporta.

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:run
